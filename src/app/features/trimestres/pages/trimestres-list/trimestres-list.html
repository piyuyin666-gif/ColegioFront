<div class="page-container">
  <mat-card class="table-card">
    <div class="header">
      <h2>Lista de trimestres</h2>

      <button mat-raised-button color="primary" (click)="nuevo()">
        Nuevo trimestre
      </button>
    </div>

    <div class="filters">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar trimestre</mat-label>
        <input matInput [formControl]="buscarControl" placeholder="Nombre o correo" />
      </mat-form-field>
    </div>

    <div class="loading-container" *ngIf="loading">
      <mat-spinner diameter="42"></mat-spinner>
    </div>

    <div class="table-container" *ngIf="!loading">
      <table mat-table [dataSource]="trimestres" class="full-width-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let trimestre">{{ trimestre.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let trimestre">{{ trimestre.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="fechaInicio">
          <th mat-header-cell *matHeaderCellDef>fechaInicio</th>
          <td mat-cell *matCellDef="let trimestre">{{ trimestre.fechaInicio | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="fechaFin">
          <th mat-header-cell *matHeaderCellDef>fechaFin</th>
          <td mat-cell *matCellDef="let trimestre">{{ trimestre.fechaFin | date:'dd/MM/yyyy' }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let trimestre" class="actions-cell">
            <button mat-stroked-button color="primary" (click)="editar(trimestre.id)">
              Editar
            </button>
            <button mat-stroked-button color="warn" (click)="eliminar(trimestre.id)">
              Eliminar
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="empty-state" *ngIf="trimestres.length === 0">
        No se encontraron trimestres.
      </div>
    </div>

    <mat-paginator
      [length]="meta.totalCount"
      [pageSize]="meta.pageSize"
      [pageIndex]="meta.currentPage - 1"
      [pageSizeOptions]="[5, 10, 20, 50]"
      showFirstLastButtons
      (page)="cambiarPagina($event)">
    </mat-paginator>
  </mat-card>
</div>
