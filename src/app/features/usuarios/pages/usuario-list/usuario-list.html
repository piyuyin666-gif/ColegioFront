<div class="page-container">
  <mat-card class="table-card">
    <div class="header">
      <h2>Lista de usuarios</h2>

      <button mat-raised-button color="primary" (click)="nuevo()">
        Nuevo usuario
      </button>
    </div>

    <div class="filters">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar usuario</mat-label>
        <input matInput [formControl]="buscarControl" placeholder="Nombre o correo" />
      </mat-form-field>
    </div>

    <div class="loading-container" *ngIf="loading">
      <mat-spinner diameter="42"></mat-spinner>
    </div>

    <div class="table-container" *ngIf="!loading">
      <table mat-table [dataSource]="usuarios" class="full-width-table">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.id }}</td>
        </ng-container>

        <ng-container matColumnDef="nombreUsuario">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.nombreUsuario }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Correo</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.email }}</td>
        </ng-container>

        <ng-container matColumnDef="rol">
          <th mat-header-cell *matHeaderCellDef>Rol</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.rol }}</td>
        </ng-container>

        <ng-container matColumnDef="fechaRegistro">
          <th mat-header-cell *matHeaderCellDef>Fecha registro</th>
          <td mat-cell *matCellDef="let usuario">{{ usuario.fechaRegistro  }}</td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let usuario" class="actions-cell">
            <button mat-stroked-button color="primary" (click)="editar(usuario.id)">
              Editar
            </button>
            <button mat-stroked-button color="warn" (click)="eliminar(usuario.id)">
              Eliminar
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <div class="empty-state" *ngIf="usuarios.length === 0">
        No se encontraron usuarios.
      </div>
    </div>

    <mat-paginator
      [length]="meta.totalCount"
      [pageSize]="meta.pageSize"
      [pageIndex]="meta.currentPage - 1"
      [pageSizeOptions]="[5, 10, 20, 50]"
      showFirstLastButtons
      (page)="cambiarPagina($event)">
    </mat-paginator>
  </mat-card>
</div>
